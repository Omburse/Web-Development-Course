<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .Container{
            background-color: rgb(218, 218, 175);
            border: 5px solid black;
            
            display: flex;
            height: 1200px;
            align-items: center;
            align-content: start;
            flex-wrap: wrap;
            
            
        }
        #box1{
            background-color: aqua;
            height: 150px;
            width: 150px;
            border: 2px solid black;
            margin: 3px;
        }
        #box2{
            background-color: rgb(121, 93, 213);
            height: 150px;
            width: 150px;
            border: 2px solid black;
            margin: 3px;
        }
        #box3{
            background-color: rgb(41, 153, 233);
            height: 150px;
            width: 150px;
            border: 2px solid black;
            margin: 3px;
        }
        #box4{
            background-color: rgb(130, 225, 118);
            height: 150px;
            width: 150px;
            border: 2px solid black;
            margin: 3px;
        }
    </style>
</head>
<body>
    <div class="Container">
        <div id="box1">item1</div>
        <div id="box2">item2</div>
        <div id="box3">item3</div>
        <div id="box4">item4</div>
    </div>
</body>
</html>
